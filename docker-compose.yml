# ============================================================
# Marketplace1 – local development stack
# Usage:
#   docker compose up --build
#   then open http://localhost:5173
#
# Default admin account (created by docker/init.sql):
#   email:    admin@marketplace.local
#   password: Marketplace1!
# ============================================================

services:

  # ── PostgreSQL ─────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: marketplace
      POSTGRES_PASSWORD: marketplace
      POSTGRES_DB: marketplace
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U marketplace -d marketplace"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Backend (Express) ──────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 5000
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: marketplace
      DB_USER: marketplace
      DB_PASSWORD: marketplace
      JWT_SECRET: local-dev-secret-change-in-production
      JWT_EXPIRES_IN: 24h
      CORS_ORIGIN: "http://localhost:5173,http://localhost:5174"
    ports:
      - "5000:5000"

  # ── Frontend (Vite dev server) ─────────────────────────────
  frontend:
    build:
      context: ./site
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      # BACKEND_URL is a Node-side variable read by vite.config.js for the proxy.
      # It is NOT exposed to the browser (no VITE_ prefix).
      BACKEND_URL: http://backend:5000
    ports:
      - "5173:5173"
    volumes:
      # Mount source for hot-reload; node_modules come from the image.
      - ./site/src:/app/src
      - ./site/public:/app/public
      - ./site/index.html:/app/index.html

volumes:
  pg_data:
